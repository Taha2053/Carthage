<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCAR Intelligence Hub - OCR & AI Extraction Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="min-h-screen text-slate-800 p-8">
    
    <div class="max-w-4xl mx-auto space-y-8">
        
        <header class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">UCAR Smart Data Lifecycle</h1>
            <p class="text-slate-500">Test the OCR and AI Analyst Agent extraction pipeline</p>
        </header>

        <div class="glass-panel p-8 rounded-2xl shadow-xl shadow-slate-200/50">
            <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" x2="12" y1="3" y2="15"></line></svg>
                Upload Document
            </h2>
            
            <form id="uploadForm" class="space-y-6">
                
                <div class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center hover:border-indigo-500 hover:bg-indigo-50 transition-colors cursor-pointer" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" name="file" class="hidden" accept=".csv,.xlsx,.pdf,.png,.jpg,.jpeg">
                    <div class="space-y-2">
                        <div class="text-slate-500 font-medium" id="fileNameDisplay">Click to browse or drag and drop</div>
                        <div class="text-sm text-slate-400">Supports PDF, JPG, PNG (OCR) or CSV, Excel (Pandas)</div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl shadow-md transition-all flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span>Extract with AI Analyst</span>
                </button>
            </form>
        </div>

        <div id="resultContainer" class="hidden glass-panel p-8 rounded-2xl shadow-xl shadow-slate-200/50 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Extraction Result
                </h2>
                <span id="methodBadge" class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider"></span>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                 <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                     <div class="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-1">Relevance Score</div>
                     <div id="scoreDisplay" class="text-2xl font-bold text-slate-800">-</div>
                 </div>
                 <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <div class="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-1">Category</div>
                    <div id="categoryDisplay" class="text-2xl font-bold text-slate-800">-</div>
                </div>
            </div>

            <div id="summaryContainer" class="hidden bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                <div class="text-xs text-indigo-500 uppercase tracking-wider font-semibold mb-1">Document Summary</div>
                <div id="summaryDisplay" class="text-slate-700 leading-relaxed"></div>
            </div>

            <div class="space-y-2 mt-4">
                <div class="text-sm text-slate-500 font-semibold uppercase tracking-wider">Raw Output</div>
                <div class="bg-slate-900 rounded-xl p-4 overflow-x-auto">
                    <pre id="jsonOutput" class="text-sm text-emerald-400 font-mono"></pre>
                </div>
            </div>
        </div>

    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultContainer = document.getElementById('resultContainer');
        const jsonOutput = document.getElementById('jsonOutput');
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameDisplay.textContent = e.target.files[0].name;
                fileNameDisplay.classList.add('text-indigo-600');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (fileInput.files.length === 0) {
                alert('Please select a file first.');
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            // Show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Processing Document...
            `;
            resultContainer.classList.add('hidden');

            try {
                const response = await fetch('/api/v1/upload/extract', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // Display results
                document.getElementById('methodBadge').textContent = data.method || 'Unknown';
                document.getElementById('scoreDisplay').textContent = data.relevance_score || 'N/A';
                
                const catElement = document.getElementById('categoryDisplay');
                catElement.textContent = data.category || 'N/A';
                if(data.category === 'HOT') catElement.className = 'text-2xl font-bold text-rose-500';
                else if(data.category === 'WARM') catElement.className = 'text-2xl font-bold text-amber-500';
                else if(data.category === 'COLD') catElement.className = 'text-2xl font-bold text-sky-500';
                else catElement.className = 'text-2xl font-bold text-slate-800';

                const summaryContainer = document.getElementById('summaryContainer');
                if (data.summary && data.summary.trim() !== '') {
                    document.getElementById('summaryDisplay').textContent = data.summary;
                    summaryContainer.classList.remove('hidden');
                } else {
                    summaryContainer.classList.add('hidden');
                }

                jsonOutput.textContent = JSON.stringify(data, null, 2);
                resultContainer.classList.remove('hidden');

            } catch (error) {
                console.error('Upload error:', error);
                alert('An error occurred during extraction. Check console for details.');
            } finally {
                // Reset button
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Extract with AI Analyst</span>`;
            }
        });
    </script>
</body>
</html>
